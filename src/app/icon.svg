  <!-- Mug body -->
  <rect x="11" y="22" width="34" height="30" rx="3" fill="url(#beer)" stroke="#2b1500" stroke-width="2"/>

  <!-- Foam -->
  <path d="M8 24 c3 -6 9 -6 12 -2 c3 -5 10 -5 13 -1 c3 -5 9 -5 12 0 c3 -4 8 -3 8 2 v4 h-45 z"
