<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a2d00"/>
      <stop offset="1" stop-color="#1a0800"/>
    </linearGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbd17b"/>
      <stop offset="1" stop-color="#8a4c0a"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff0c8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="#f5b942" stroke-opacity="0.45" stroke-width="1.5"/>

  <!-- Handle -->
  <path d="M44 26 h6 a5 5 0 0 1 5 5 v6 a5 5 0 0 1 -5 5 h-6 v-4 h4 a3 3 0 0 0 3 -3 v-2 a3 3 0 0 0 -3 -3 h-4 z"
